<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">

    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Payment - Explore World</title>

    <link rel="stylesheet" href="css/style.css">

</head>

<body>

<div class="payment-box">

    <h1>💳 Secure Payment</h1>

    <div class="card-icons">
        💳 💰 🔒
    </div>

    <form onsubmit="return payNow()">

        <input type="text" placeholder="Card Holder Name" required>

        <br><br>

        <input type="text"
               placeholder="Card Number"
               maxlength="16"
               required>

        <br><br>

        <input type="month" required>

        <br><br>

        <input type="password"
               placeholder="CVV"
               maxlength="3"
               required>

        <br><br>

        <input type="number"
               placeholder="Amount (₹)"
               required>

        <br><br>

        <button type="submit">
            💳 Pay Now
        </button>

    </form>

    <p class="secure-text">
        🔒 100% Secure Demo Payment
    </p>

</div>

<script>
function payNow() {

    let bookingId = localStorage.getItem("bookingId");
    let name = localStorage.getItem("bookingName");
    let destination = localStorage.getItem("bookingDestination");
    let date = localStorage.getItem("bookingDate");
    let people = localStorage.getItem("bookingPeople");

    let receiptWindow = window.open("", "_blank");

    receiptWindow.document.write(`
    <!DOCTYPE html>
    <html>
    <head>
        <title>Explore World Receipt</title>
        <style>
            body{
                font-family: Arial, sans-serif;
                padding:40px;
                background:#f4f4f4;
            }

            .receipt{
                max-width:600px;
                margin:auto;
                background:white;
                padding:30px;
                border-radius:10px;
                box-shadow:0 0 10px rgba(0,0,0,0.2);
            }

            h1{
                text-align:center;
                color:#0077cc;
            }

            hr{
                margin:20px 0;
            }

            p{
                font-size:18px;
                margin:10px 0;
            }

            .status{
                color:green;
                font-weight:bold;
            }

            .footer{
                text-align:center;
                margin-top:30px;
                color:#555;
            }
        </style>
    </head>

    <body>

        <div class="receipt">

            <h1>🧾 Explore World</h1>

            <hr>

            <p><b>🆔 Booking ID:</b> ${bookingId}</p>

            <p><b>👤 Customer Name:</b> ${name}</p>

            <p><b>📍 Destination:</b> ${destination}</p>

            <p><b>📅 Travel Date:</b> ${date}</p>

            <p><b>👥 Number of Travelers:</b> ${people}</p>

            <p><b>💳 Payment Status:</b>
                <span class="status">PAID ✅</span>
            </p>

            <hr>

            <div class="footer">

                <h2>✈️ Thank You for Choosing Explore World!</h2>

                <p>We wish you a safe and memorable journey.</p>

            </div>

        </div>

    </body>
    </html>
    `);

    receiptWindow.document.close();

    receiptWindow.print();

    document.querySelector(".payment-box").innerHTML = `
        <h1 style="color:green;">✅ Payment Successful</h1>
        <p>Your booking has been confirmed.</p>
        <button onclick="window.location.href='index.html'">
            🏠 Back to Home
        </button>
    `;

    return false;
}
</script>
</body>

</html>
